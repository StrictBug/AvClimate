<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviation climatology</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div class="loading-overlay hidden" id="loading-overlay" role="status" aria-live="polite">
    <div class="loading-card">
      <div class="loading-title">Loading data</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-bar-fill"></div>
      </div>
      <div class="loading-status" id="loading-status">Preparing charts...</div>
    </div>
  </div>

  <header class="app-header">
    <div class="title-row">Aviation climate explorer</div>
    <div class="category-row" id="category-row"></div>
  </header>

  <main class="page">
    <section class="controls">
      <label class="control">
        <span>Aerodrome</span>
        <select id="icao"></select>
      </label>

      <label class="control">
        <span>ENSO</span>
        <select id="enso">
          <option value="all" selected>All</option>
          <option value="el_nino">El Nino</option>
          <option value="la_nina">La Nina</option>
          <option value="neutral">Neutral</option>
        </select>
      </label>

      <label class="control">
        <span>IOD</span>
        <select id="iod">
          <option value="all" selected>All</option>
          <option value="positive">Positive</option>
          <option value="negative">Negative</option>
          <option value="neutral">Neutral</option>
        </select>
      </label>

      <label class="control">
        <span>SAM</span>
        <select id="sam">
          <option value="all" selected>All</option>
          <option value="positive">Positive</option>
          <option value="negative">Negative</option>
          <option value="neutral">Neutral</option>
        </select>
      </label>

      <label class="control">
        <span>MJO</span>
        <select id="mjo">
          <option value="all" selected>All</option>
          <option value="inactive">Inactive</option>
          <option value="phase_1">Phase 1</option>
          <option value="phase_2">Phase 2</option>
          <option value="phase_3">Phase 3</option>
          <option value="phase_4">Phase 4</option>
          <option value="phase_5">Phase 5</option>
          <option value="phase_6">Phase 6</option>
          <option value="phase_7">Phase 7</option>
          <option value="phase_8">Phase 8</option>
        </select>
      </label>
    </section>

    <section class="status" id="status"></section>

    <section class="chart-grid" id="chart-grid">
      <article class="chart-card"><div class="chart" id="chart-1"></div></article>
      <article class="chart-card"><div class="chart" id="chart-2"></div></article>
      <article class="chart-card"><div class="chart" id="chart-3"></div></article>
      <article class="chart-card"><div class="chart" id="chart-4"></div></article>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="time-controls">
      <div class="dual-slider-grid">
        <div class="dual-slider-block">
          <div class="range-time-row">
            <div class="range-time-item range-time-item-start" id="year-start-value"></div>
            <div class="frame-slider-shell">
              <div class="frame-slider-base"></div>
              <div class="frame-selection-highlight" id="year-highlight"></div>
              <input id="year-start" class="frame-bound-slider" type="range" min="2000" max="2025" step="1" value="2000">
              <input id="year-end" class="frame-bound-slider" type="range" min="2000" max="2025" step="1" value="2025">
            </div>
            <div class="range-time-item range-time-item-end" id="year-end-value"></div>
          </div>
        </div>

        <div class="dual-slider-block">
          <div class="range-time-row">
            <div class="range-time-item range-time-item-start" id="month-start-value"></div>
            <div class="frame-slider-shell">
              <div class="frame-slider-base"></div>
              <div class="frame-selection-highlight" id="month-highlight"></div>
              <input id="month-start" class="frame-bound-slider" type="range" min="1" max="12" step="1" value="1">
              <input id="month-end" class="frame-bound-slider" type="range" min="1" max="12" step="1" value="12">
            </div>
            <div class="range-time-item range-time-item-end" id="month-end-value"></div>
            <div class="slider-footer">
              <label class="check-control">
                <input id="invert-month" type="checkbox">
                <span>Invert month range</span>
              </label>
            </div>
          </div>
        </div>

        <div class="dual-slider-block">
          <div class="range-time-row">
            <div class="range-time-item range-time-item-start" id="hour-start-value"></div>
            <div class="frame-slider-shell">
              <div class="frame-slider-base"></div>
              <div class="frame-selection-highlight" id="hour-highlight"></div>
              <input id="hour-start" class="frame-bound-slider" type="range" min="0" max="23" step="1" value="0">
              <input id="hour-end" class="frame-bound-slider" type="range" min="0" max="23" step="1" value="23">
            </div>
            <div class="range-time-item range-time-item-end" id="hour-end-value"></div>
            <div class="slider-footer">
              <label class="check-control">
                <input id="invert-hour" type="checkbox">
                <span>Invert time range</span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
